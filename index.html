<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dmitry Tomashevich — CV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    header {
      width: 100%;
      background: #1a1a2e;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    a.download-btn {
      background: #4f8ef7;
      color: #fff;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    a.download-btn:hover { background: #3a78e0; }
    .pdf-container {
      flex: 1;
      width: 100%;
      max-width: 960px;
      padding: 24px 16px;
    }
    embed {
      width: 100%;
      height: calc(100vh - 100px);
      border: none;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .fallback {
      display: none;
      text-align: center;
      padding: 40px;
      color: #555;
    }
    .fallback a { color: #4f8ef7; font-weight: 600; }
  </style>
</head>
<body>
  <header>
    <h1>Dmitry Tomashevich — CV</h1>
    <a class="download-btn" href="Dmitry_Tomashevich_CV.pdf" download>Download PDF</a>
  </header>
  <div class="pdf-container">
    <embed
      src="Dmitry_Tomashevich_CV.pdf"
      type="application/pdf"
      onerror="document.querySelector('.fallback').style.display='block';this.style.display='none';"
    />
    <div class="fallback">
      <p>Your browser does not support inline PDF viewing.</p>
      <p style="margin-top:12px">
        <a href="Dmitry_Tomashevich_CV.pdf" download>Download the CV as PDF</a>
      </p>
    </div>
  </div>
</body>
</html>
